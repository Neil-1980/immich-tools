<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duplicate reviewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: system-ui, sans-serif; background: #111; color: #eee; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
#loading { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px; }
#loading .big { font-size: 20px; color: #aaa; font-weight: 500; }
#loading p { font-size: 14px; color: #666; }
#app { display: none; flex-direction: column; height: 100%; min-height: 0; }
#topbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; border-bottom: 1px solid #222; background: #0d0d0d; flex-shrink: 0; flex-wrap: wrap; gap: 8px; }
#topbar a { font-size: 13px; color: #555; text-decoration: none; }
#topbar a:hover { color: #888; }
.stats { font-size: 13px; display: flex; gap: 14px; flex-wrap: wrap; }
.stats .lbl { color: #888; }
.kept { color: #4ade80; }
.deleted { color: #f87171; }
.skipped { color: #facc15; }
#error-bar { display: none; background: #7f1d1d; color: #fca5a5; font-size: 13px; padding: 8px 16px; text-align: center; flex-shrink: 0; }
#viewer { display: flex; flex: 1; min-height: 0; overflow: hidden; }
.panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #1a1a1a; min-width: 0; min-height: 0; transition: opacity 0.15s; }
.panel:last-child { border-right: none; }
.panel.marked { opacity: 0.45; outline: 2px solid #f87171; outline-offset: -2px; }
.panel-header { flex-shrink: 0; height: 22px; display: flex; align-items: center; justify-content: center; gap: 10px; background: #0d0d0d; border-bottom: 1px solid #1a1a1a; }
.panel-num { font-size: 12px; color: #444; }
.recommended-label { font-size: 12px; color: #4ade80; }
.marked-label { font-size: 12px; color: #f87171; display: none; }
.panel.marked .marked-label { display: block; }
.panel.marked .recommended-label { display: none; }
.img-wrap { flex: 1; display: flex; align-items: center; justify-content: center; background: #0a0a0a; position: relative; overflow: hidden; min-height: 0; cursor: pointer; }
.img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
.spinner { font-size: 13px; color: #444; }
.panel-footer { padding: 5px 12px; background: #0d0d0d; border-top: 1px solid #1a1a1a; flex-shrink: 0; }
.filename { font-size: 11px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.meta { display: flex; gap: 10px; font-size: 11px; color: #666; flex-wrap: wrap; }
.mark-btn { width: 100%; padding: 9px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; flex-shrink: 0; background: #1a1a1a; color: #666; transition: background 0.1s, color 0.1s; }
.panel.marked .mark-btn { background: #7f1d1d; color: #f87171; }
.mark-btn:hover { background: #222; }
.panel.marked .mark-btn:hover { background: #991b1b; }
#controls { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 8px 16px; background: #0d0d0d; border-top: 1px solid #222; flex-shrink: 0; flex-wrap: wrap; }
#controls button { padding: 6px 18px; border-radius: 7px; border: 1px solid #2a2a2a; background: #1a1a1a; color: #bbb; font-size: 13px; cursor: pointer; }
#controls button:hover { background: #222; }
#btn-delete { border-color: #7f1d1d; color: #f87171; display: none; }
#btn-delete:hover { background: #7f1d1d; }
.hint { font-size: 12px; color: #3a3a3a; }
#done { display: none; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; gap: 12px; padding: 2rem; }
#done .big { font-size: 48px; font-weight: 500; color: #4ade80; }
#done h2 { font-size: 20px; font-weight: 500; }
#done p { font-size: 14px; color: #666; line-height: 1.8; }
#done a { color: #378ADD; font-size: 14px; }
</style>
</head>
<body>
<div id="loading"><p class="big">Loading duplicates...</p><p>Fetching from Immich</p></div>
<div id="app">
  <div id="topbar">
    <a href="/">&#8592; back</a>
    <div class="stats">
      <span class="lbl">Group <span id="stat-pair">&#8212;</span> of <span id="stat-total">&#8212;</span></span>
      <span class="kept"><span id="stat-kept">0</span> kept</span>
      <span class="deleted"><span id="stat-deleted">0</span> deleted</span>
      <span class="skipped"><span id="stat-skipped">0</span> skipped</span>
    </div>
  </div>
  <div id="error-bar"></div>
  <div id="viewer"></div>
  <div id="controls">
    <button id="btn-delete" onclick="deleteMarked()">Delete marked [D]</button>
    <button onclick="skip()">Keep all [S]</button>
    <span class="hint" id="hint-text"></span>
  </div>
</div>
<div id="done">
  <div class="big" id="done-count">0</div>
  <h2>All duplicates reviewed</h2>
  <p id="done-stats"></p>
  <a href="/">&#8592; back to tools</a>
</div>
<script>
let groups=[],idx=0,stats={kept:0,deleted:0,skipped:0},currentAssets=[],marked=new Set(),busy=false;

function fmt(b){if(!b)return null;return b>1048576?(b/1048576).toFixed(1)+' MB':Math.round(b/1024)+' KB';}
function fmtDate(s){if(!s)return null;return new Date(s).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}

function getRecommended(assets){
  let best=0;
  for(let i=1;i<assets.length;i++){
    const a=assets[best], b=assets[i];
    const resA=(a.exifInfo&&a.exifInfo.exifImageWidth&&a.exifInfo.exifImageHeight)?a.exifInfo.exifImageWidth*a.exifInfo.exifImageHeight:0;
    const resB=(b.exifInfo&&b.exifInfo.exifImageWidth&&b.exifInfo.exifImageHeight)?b.exifInfo.exifImageWidth*b.exifInfo.exifImageHeight:0;
    const sizeA=(a.exifInfo&&a.exifInfo.fileSizeInByte)||0;
    const sizeB=(b.exifInfo&&b.exifInfo.fileSizeInByte)||0;
    if(resB>resA||(resB===resA&&sizeB>sizeA))best=i;
  }
  return best;
}

async function init(){
  try{
    const r=await fetch('/api/duplicates');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    groups=data.filter(g=>g.assets&&g.assets.length>=2);
    if(groups.length===0){
      document.getElementById('loading').innerHTML='<p class="big">No duplicates found!</p><p>Immich found nothing to review.</p>';
      return;
    }
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('stat-total').textContent=groups.length;
    loadGroup();
  }catch(e){
    document.getElementById('loading').innerHTML='<p class="big" style="color:#f87171">Connection failed</p><p style="color:#666">'+e.message+'</p>';
  }
}

function loadGroup(){
  if(idx>=groups.length){showDone();return;}
  busy=false;
  marked=new Set();
  currentAssets=groups[idx].assets;
  document.getElementById('stat-pair').textContent=idx+1;
  document.getElementById('btn-delete').style.display='none';
  const rec=getRecommended(currentAssets);
  const count=currentAssets.length;
  const keys=count<=9?'1-'+count+' toggle mark':' number keys toggle mark';
  document.getElementById('hint-text').textContent=keys+' \u2022 D delete marked \u2022 S keep all';

  const viewer=document.getElementById('viewer');
  viewer.innerHTML='';
  currentAssets.forEach((asset,i)=>{
    const panel=document.createElement('div');
    panel.className='panel';
    panel.id='panel-'+i;

    const hdr=document.createElement('div');
    hdr.className='panel-header';
    hdr.innerHTML='<span class="panel-num">['+( i+1)+']</span>'
      +(i===rec?'<span class="recommended-label">recommended</span>':'')
      +'<span class="marked-label">marked for deletion</span>';
    panel.appendChild(hdr);

    const wrap=document.createElement('div');
    wrap.className='img-wrap';
    wrap.onclick=()=>toggleMark(i);
    const sp=document.createElement('span');
    sp.className='spinner';
    sp.textContent='Loading...';
    wrap.appendChild(sp);
    panel.appendChild(wrap);

    const footer=document.createElement('div');
    footer.className='panel-footer';
    const ei=asset.exifInfo||{};
    const parts=[];
    const s=fmt(ei.fileSizeInByte);if(s)parts.push(s);
    const d=fmtDate(asset.fileCreatedAt||asset.localDateTime);if(d)parts.push(d);
    if(ei.exifImageWidth&&ei.exifImageHeight)parts.push(ei.exifImageWidth+'x'+ei.exifImageHeight);
    footer.innerHTML='<div class="filename">'+(asset.originalFileName||asset.id)+'</div>'
      +'<div class="meta">'+parts.map(p=>'<span>'+p+'</span>').join('')+'</div>';
    panel.appendChild(footer);

    const btn=document.createElement('button');
    btn.className='mark-btn';
    btn.textContent='Mark for deletion ['+(i+1)+']';
    btn.onclick=()=>toggleMark(i);
    panel.appendChild(btn);

    viewer.appendChild(panel);

    const img=new Image();
    img.style.cssText='max-width:100%;max-height:100%;object-fit:contain;display:none;';
    img.onload=()=>{sp.style.display='none';img.style.display='block';};
    img.onerror=()=>{sp.textContent='Could not load';};
    img.src='/api/assets/'+asset.id+'/thumbnail?size=preview';
    wrap.appendChild(img);
  });
}

function toggleMark(i){
  if(busy)return;
  if(marked.has(i))marked.delete(i);
  else marked.add(i);
  document.getElementById('panel-'+i).classList.toggle('marked',marked.has(i));
  document.getElementById('btn-delete').style.display=marked.size>0?'block':'none';
}

async function deleteMarked(){
  if(busy||marked.size===0)return;
  busy=true;
  const ids=Array.from(marked).map(i=>currentAssets[i].id);
  try{
    const r=await fetch('/api/assets',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids,force:false})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const kept=currentAssets.length-marked.size;
    stats.kept+=kept;
    stats.deleted+=marked.size;
  }catch(e){
    showError('Delete failed: '+e.message); busy=false; return;
  }
  updateStats();
  idx++;
  loadGroup();
}

function skip(){if(busy)return;stats.skipped+=currentAssets.length;idx++;updateStats();loadGroup();}

function updateStats(){
  document.getElementById('stat-kept').textContent=stats.kept;
  document.getElementById('stat-deleted').textContent=stats.deleted;
  document.getElementById('stat-skipped').textContent=stats.skipped;
}
function showError(msg){
  const b=document.getElementById('error-bar');
  b.textContent=msg; b.style.display='block';
  setTimeout(()=>b.style.display='none',5000);
}
function showDone(){
  document.getElementById('app').style.display='none';
  const d=document.getElementById('done'); d.style.display='flex';
  document.getElementById('done-count').textContent=stats.kept+stats.skipped;
  document.getElementById('done-stats').textContent=stats.deleted+' photos deleted  \u2022  '+stats.skipped+' kept';
}

document.addEventListener('keydown',e=>{
  if(document.getElementById('app').style.display==='none')return;
  const n=parseInt(e.key);
  if(!isNaN(n)&&n>=1&&n<=currentAssets.length)toggleMark(n-1);
  if(e.key==='d'||e.key==='D')deleteMarked();
  if(e.key==='s'||e.key==='S')skip();
});

init();
</script>
</body>
</html>
