<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Immich tools</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #111; color: #eee; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; padding: 2rem; }
h1 { font-size: 22px; font-weight: 500; color: #ccc; }
.cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
.card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 2rem 1.5rem; width: 220px; text-align: center; text-decoration: none; color: #eee; transition: background 0.15s; display: flex; flex-direction: column; gap: 10px; }
.card:hover { background: #222; border-color: #3a3a3a; }
.card h2 { font-size: 16px; font-weight: 500; }
.card p { font-size: 13px; color: #666; line-height: 1.6; }
</style>
</head>
<body>
<h1>Immich tools</h1>
<div class="cards">
  <a class="card" href="/dedup.html">
    <h2>Duplicate reviewer</h2>
    <p>Review duplicate photos side by side and delete the unwanted copy</p>
  </a>
  <a class="card" href="/albums.html">
    <h2>Multi-album cleanup</h2>
    <p>Find photos appearing in multiple albums and remove from the wrong one</p>
  </a>
</div>
</body>
</html>
